<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Event</title>
    <link rel="icon" href="images/nextdorm-logo-alt2.png" type="image/png">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- STYLE SHEET -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg ra-navbar">

        <div class="container-fluid">

            <!-- HEADER LOGO -->

            <a class="navbar-brand" href="index.html">
                <img src="images/nextdorm-logo-alt3.png" alt="Logo" width="155" height="55"
                    class="d-inline-block align-text-top">
            </a>

            <!-- COLLAPSE AT SIZE -->

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <!-- SEARCH BAR -->

                <form class="d-flex navbar-search" role="search">

                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-custom" type="submit">Search</button>

                </form>

                <a class="navbar-icon" id="user-ban-icon" href="user-ban-form.html">
                    <img src="images/nextdorm-icon-user-ban-form.png" alt="Logo" width="60" height="60"
                        class="d-inline-block align-text-top">
                </a>

                <a class="navbar-icon" id="profile-icon" href="profile-edit.html">
                    <img src="images/nextdorm-icon-profile.png" alt="Logo" width="60" height="60"
                        class="d-inline-block align-text-top">
                </a>

            </div>

        </div>

    </nav>

    <div class="nav-column">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="announcements.html">Announcements</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="events.html">Events</a>
            </li>

    </div>

    <div class="main-container container-fluid" id="announcement-creation-page">

        <div class="card" id="announcement-form">

            <div class="mx-3 my-3">
                <label class="form-label"><strong>Create an Event</strong></label>
            </div>

            <!-- Error / success message area -->
            <div id="form-message" class="mx-3 mb-2" style="display:none;"></div>

            <div class="mx-3 mb-3">
                <input type="text" class="form-control" id="input-description"
                    placeholder="Enter a description for your event">
            </div>

            <div class="mx-3 mb-3">
                <input type="text" class="form-control" id="input-org"
                    placeholder="Enter organization or club name">
            </div>

            <div class="mx-3 mb-3">
                <input type="text" class="form-control" id="input-date"
                    placeholder="Enter date of event (e.g. 2025-04-30)">
            </div>

            <div class="mx-3 mb-3">
                <input type="text" class="form-control" id="input-location"
                    placeholder="Enter location of event">
            </div>

            <div class="mx-3 mb-3">
                <input type="number" class="form-control" id="input-ra-id"
                    placeholder="Enter your RA ID number">
            </div>

            <button class="btn btn-outline-custom mx-3 mb-3" id="post-btn" onclick="submitEvent()">Post Event</button>

        </div>

    </div>

    <script>
        const API_BASE = "http://localhost:8080";

        async function submitEvent() {
            // Read values from the form
            const description   = document.getElementById("input-description").value.trim();
            const orgName       = document.getElementById("input-org").value.trim();
            const eventDate     = document.getElementById("input-date").value.trim();
            const location      = document.getElementById("input-location").value.trim();
            const raId          = document.getElementById("input-ra-id").value.trim();

            const msgBox = document.getElementById("form-message");

            // Basic validation — make sure nothing is empty
            if (!description || !orgName || !eventDate || !location || !raId) {
                msgBox.style.display = "block";
                msgBox.className = "mx-3 mb-2 alert alert-danger";
                msgBox.textContent = "Please fill in all fields before posting.";
                return;
            }

            // Build the JSON body the backend expects.
            // The RA is sent as a nested object with just { userId: <id> }
            // so JPA can look it up by its primary key.
            const eventData = {
                organizationName: orgName,
                eventDate:        eventDate,
                location:         location,
                description:      description,
                ra: { userId: parseInt(raId) }
            };

            try {
                const response = await fetch(`${API_BASE}/eventposts`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify(eventData)
                });

                if (response.ok) {
                    // Success — redirect to the events feed
                    window.location.href = "events.html";
                } else {
                    const errText = await response.text();
                    msgBox.style.display = "block";
                    msgBox.className = "mx-3 mb-2 alert alert-danger";
                    msgBox.textContent = "Error posting event: " + errText;
                }
            } catch (err) {
                msgBox.style.display = "block";
                msgBox.className = "mx-3 mb-2 alert alert-danger";
                msgBox.textContent = "Could not reach server. Is Spring Boot running on port 8080?";
            }
        }
    </script>

</body>

</html>
