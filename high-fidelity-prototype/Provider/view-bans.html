<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Issued Bans</title>
    <link rel="icon" href="images/nextdorm-logo-alt2.png" type="image/png">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- STYLE SHEET -->

    <link rel="stylesheet" href="style.css">

    <style>
        .ban-badge {
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 12px;
            background-color: #fce4ec;
            color: #c62828;
            font-weight: 600;
        }
        #ban-table-wrapper {
            overflow-x: auto;
        }
        .ban-table th {
            background-color: #f0f0f0;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg ra-navbar">

        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                <img src="images/nextdorm-logo-alt3.png" alt="Logo" width="155" height="55"
                    class="d-inline-block align-text-top">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <form class="d-flex navbar-search" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-custom" type="submit">Search</button>
                </form>

                <a class="navbar-icon" id="user-ban-icon" href="user-ban-form.html">
                    <img src="images/nextdorm-icon-user-ban-form.png" alt="Logo" width="60" height="60"
                        class="d-inline-block align-text-top">
                </a>

                <a class="navbar-icon" id="profile-icon" href="profile-edit.html">
                    <img src="images/nextdorm-icon-profile.png" alt="Logo" width="60" height="60"
                        class="d-inline-block align-text-top">
                </a>

            </div>

        </div>

    </nav>

    <!-- LEFT NAV -->

    <div class="nav-column">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="announcements.html">Announcements</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="events.html">Events</a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT — matches user-ban-form and create-event layout exactly -->

    <div class="main-container container-fluid" id="announcement-creation-page">

        <div class="card" id="announcement-form">

            <div class="mx-3 my-3">
                <label class="form-label"><strong>View Issued Bans</strong></label>
            </div>

            <!-- Inline feedback -->
            <div id="lookup-message" style="display:none;" class="mx-3 mb-2"></div>

            <!-- RA ID input -->
            <div class="mx-3 mb-3">
                <input type="number" class="form-control" id="input-ra-id"
                    placeholder="Enter your RA ID">
            </div>

            <button class="btn btn-outline-custom mx-3 mb-3" onclick="loadBans()">Load Bans</button>

            <div class="mx-3 mb-3">
                <a href="user-ban-form.html" class="btn btn-outline-secondary w-100">Issue a New Ban</a>
            </div>

            <!-- Results shown after search -->

            <div id="bans-section" style="display:none;" class="mx-3 mb-3">

                <hr>

                <p class="form-label mt-2" id="bans-heading"></p>

                <p id="no-bans-msg" class="text-muted" style="display:none;">
                    No bans have been issued yet.
                </p>

                <div id="ban-table-wrapper" style="display:none;">
                    <table class="table table-bordered ban-table">
                        <thead>
                            <tr>
                                <th>Ban ID</th>
                                <th>Student ID</th>
                                <th>Reason</th>
                                <th>Length</th>
                            </tr>
                        </thead>
                        <tbody id="ban-table-body">
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </div>

    <script>
        const API_BASE = "http://localhost:8080";

        function escapeHtml(str) {
            if (str === null || str === undefined) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        async function loadBans() {
            const raId      = document.getElementById("input-ra-id").value.trim();
            const msgBox    = document.getElementById("lookup-message");
            const section   = document.getElementById("bans-section");
            const heading   = document.getElementById("bans-heading");
            const noMsg     = document.getElementById("no-bans-msg");
            const tableWrap = document.getElementById("ban-table-wrapper");
            const tbody     = document.getElementById("ban-table-body");

            if (!raId) {
                msgBox.style.display = "block";
                msgBox.className = "mx-3 mb-2 alert alert-danger";
                msgBox.textContent = "Please enter your RA ID.";
                return;
            }

            msgBox.style.display = "none";

            try {
                const response = await fetch(`${API_BASE}/bans/ra/${raId}`);

                if (!response.ok) throw new Error(`Server returned ${response.status}`);

                const bans = await response.json();

                section.style.display = "block";
                heading.textContent = `Bans issued by RA #${raId}`;

                if (bans.length === 0) {
                    noMsg.style.display = "block";
                    tableWrap.style.display = "none";
                    return;
                }

                noMsg.style.display = "none";
                tableWrap.style.display = "block";

                tbody.innerHTML = bans.map(ban => `
                    <tr>
                        <td>${escapeHtml(ban.banId)}</td>
                        <td>${escapeHtml(ban.studentId)}</td>
                        <td>${escapeHtml(ban.description)}</td>
                        <td><span class="ban-badge">${escapeHtml(ban.banLength)} day${ban.banLength !== 1 ? "s" : ""}</span></td>
                    </tr>
                `).join("");

            } catch (err) {
                msgBox.style.display = "block";
                msgBox.className = "mx-3 mb-2 alert alert-danger";
                msgBox.textContent = "Could not load bans. Is Spring Boot running? (" + err.message + ")";
                section.style.display = "none";
            }
        }

        // Pre-fill RA ID from URL query string if redirected here: view-bans.html?raId=1
        (function prefillFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const raId = params.get("raId");
            if (raId) {
                document.getElementById("input-ra-id").value = raId;
                loadBans();
            }
        })();
    </script>

</body>

</html>
